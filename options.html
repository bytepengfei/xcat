<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XCat 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">XCAT</p>
        <h1>屏蔽关键词设置</h1>
        <p class="description">评论、昵称或用户名中包含任一关键词时，该评论会被置灰标记。</p>
      </header>

      <form id="settings-form">
        <label class="toggle-row" for="show-comment-panel">
          <span>
            <strong>显示右侧评论浮窗</strong>
            <small>关闭后仍会继续过滤垃圾评论。</small>
          </span>
          <input id="show-comment-panel" type="checkbox">
        </label>

        <hr>

        <label for="keywords">自定义关键词</label>
        <textarea id="keywords" rows="12" spellcheck="false" placeholder="每行输入一个关键词"></textarea>
        <p class="hint">每行一个关键词，不区分大小写。未配置关键词时不会自动标记垃圾回复。</p>

        <hr>

        <div class="field-heading">
          <label for="subscription-urls">关键词订阅</label>
          <button id="sync-subscriptions" class="secondary" type="button">同步</button>
        </div>
        <textarea id="subscription-urls" rows="5" spellcheck="false" placeholder="每行输入一个订阅链接"></textarea>
        <p class="hint">订阅内容按行解析关键词，空行和以 # 开头的行会被忽略。</p>

        <label for="subscription-preview">订阅关键词预览</label>
        <textarea id="subscription-preview" rows="8" readonly spellcheck="false" placeholder="同步后在这里预览订阅关键词"></textarea>
        <p class="hint">预览内容来自最近一次同步，会和自定义关键词一起用于标记垃圾回复。</p>

        <div class="actions">
          <button type="submit">保存设置</button>
          <button id="clear-keywords" class="secondary" type="button">清空自定义关键词</button>
        </div>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
