<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XCat</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <div class="cat" aria-hidden="true">
        <span class="ear ear-left"></span>
        <span class="ear ear-right"></span>
        <span class="face">
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="nose"></span>
        </span>
      </div>
      <h1>XCat</h1>
      <p>Open X and filter unwanted replies on post pages.</p>
      <button id="visit-x" type="button">Visit x.com</button>
      <button id="open-settings" class="secondary" type="button">屏蔽关键词设置</button>
      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
